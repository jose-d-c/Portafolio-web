<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Programa temporal 18 partes 1 2 3 4 5 6 y 7</title>
  <desc id="desc">Comparacion de algoritmos para partes 1 2 3 4 5 6 y 7</desc>
  <rect width="1200" height="675" fill="#0f172a"/>
  <text x="600" y="90" text-anchor="middle" fill="#e2e8f0" font-family="Arial" font-size="42" font-weight="700">Programa temporal 18 - Partes 1, 2, 3, 4, 5, 6 y 7</text>
  <text x="600" y="145" text-anchor="middle" fill="#93c5fd" font-family="Arial" font-size="28">Comparacion de algoritmos de ordenamiento</text>
  <text x="600" y="220" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="24">Parte 1: arreglo base de nombres</text>
  <text x="600" y="260" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="24">Parte 2: arreglos casi ordenados</text>
  <text x="600" y="300" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="24">Parte 3: arreglos invertidos</text>
  <text x="600" y="340" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="24">Parte 4: valores repetidos</text>
  <text x="600" y="380" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="24">Parte 5: arreglos parcialmente ordenados</text>
  <text x="600" y="420" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="24">Parte 6: serie dolar 2022</text>
  <text x="600" y="460" text-anchor="middle" fill="#cbd5e1" font-family="Arial" font-size="24">Parte 7: repeticion de nombres</text>
  <text x="600" y="510" text-anchor="middle" fill="#e2e8f0" font-family="Arial" font-size="22">Salida separada por partes en menu desplegable</text>
</svg>
