<svg xmlns="http://www.w3.org/2000/svg" width="1439" height="1180" viewBox="0 0 1439 1180" role="img" aria-labelledby="titulo desc">
  <title id="titulo">Búsqueda Binaria</title>
  <desc id="desc">Lámina explicativa de búsqueda binaria replicando el contenido textual de referencia.</desc>
  <rect width="1439" height="1080" fill="#f3f3f3" />

  <polygon points="0,0 220,0 0,380" fill="#0e6b30" opacity="0.95" />
  <polygon points="0,0 140,0 44,300" fill="#3f9c3b" opacity="0.65" />
  <polygon points="150,35 380,0 265,170" fill="#4a9e31" opacity="0.9" />
  <polygon points="278,92 388,182 280,228" fill="#efe688" opacity="0.9" />
  <polygon points="80,225 176,286 68,323" fill="#cfd77d" opacity="0.9" />

  <text x="720" y="170" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="700" fill="#0a69b9">Búsqueda Binaria</text>

  <text x="84" y="460" font-family="Arial, Helvetica, sans-serif" font-size="66" fill="#000">Se llama también dicotonámica.</text>

  <text x="84" y="560" font-family="Arial, Helvetica, sans-serif" font-size="62" fill="#000">Se utiliza cuando el vector en el que queremos determinar la</text>
  <text x="190" y="630" font-family="Arial, Helvetica, sans-serif" font-size="62" fill="#000">existencia de un elemento está previamente ordenado.</text>

  <text x="84" y="730" font-family="Arial, Helvetica, sans-serif" font-size="62" fill="#000">Este algoritmo reduce el tiempo de búsqueda</text>
  <text x="190" y="800" font-family="Arial, Helvetica, sans-serif" font-size="62" fill="#000">considerablemente, ya que disminuye exponencialmente</text>
  <text x="190" y="870" font-family="Arial, Helvetica, sans-serif" font-size="62" fill="#000">el número de iteraciones necesarias.</text>

  <text x="84" y="970" font-family="Arial, Helvetica, sans-serif" font-size="62" fill="#000">Está altamente recomendado para buscar en arrays de gran tamaño.</text>

  <text x="84" y="1040" font-family="Arial, Helvetica, sans-serif" font-size="66" fill="#e40000">Por ejemplo, en uno conteniendo 50.000.000 elementos,</text>
  <text x="190" y="1110" font-family="Arial, Helvetica, sans-serif" font-size="66" fill="#e40000">realiza como máximo 26 comparaciones (en el peor de los casos).</text>

  <polygon points="1439,960 1280,850 1325,1100" fill="#8db876" opacity="0.8" />
</svg>
